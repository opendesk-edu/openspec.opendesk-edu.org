suite: Zammad Elasticsearch connection config
templates:
  - deployment.yaml
tests:
  - it: should configure Elasticsearch host
    release:
      name: zammad
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: zammad
        document:
          spec:
            template:
              spec:
                containers:
                  - name: zammad
                    env:
                      - name: ELASTICSEARCH_HOST
                        value: elasticsearch

  - it: should set Elasticsearch port to 9200
    release:
      name: zammad
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: zammad
        document:
          spec:
            template:
              spec:
                containers:
                  - name: zammad
                    env:
                      - name: ELASTICSEARCH_PORT
                        value: "9200"

  - it: should configure Elasticsearch full URL
    release:
      name: zammad
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: zammad
        document:
          spec:
            template:
              spec:
                containers:
                  - name: zammad
                    env:
                      - name: ELASTICSEARCH_URL
                        value: http://elasticsearch:9200

  - it: should set Elasticsearch index prefix
    release:
      name: zammad
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: zammad
        document:
          spec:
            template:
              spec:
                containers:
                  - name: zammad
                    env:
                      - name: ELASTICSEARCH_INDEX
                        value: zammad

  - it: should configure Elasticsearch namespace
    release:
      name: zammad
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: zammad
        document:
          spec:
            template:
              spec:
                containers:
                  - name: zammad
                    env:
                      - name: ELASTICSEARCH_NAMESPACE
                        value: zammad

  - it: should enable Elasticsearch SSL/TLS if configured
    release:
      name: zammad
    set:
      elasticsearch:
        ssl:
          enabled: true
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: zammad
        document:
          spec:
            template:
              spec:
                containers:
                  - name: zammad
                    env:
                      - name: ELASTICSEARCH_SSL
                        value: "true"
                      - name: ELASTICSEARCH_SSL_VERIFY
                        value: "true"

  - it: should configure Elasticsearch search timeout
    release:
      name: zammad
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: zammad
        document:
          spec:
            template:
              spec:
                containers:
                  - name: zammad
                    env:
                      - name: ELASTICSEARCHSearchTimeout
                        value: "60"
