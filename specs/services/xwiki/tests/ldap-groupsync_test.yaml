suite: XWiki LDAP group synchronization config
templates:
  - deployment.yaml
tests:
  - it: should configure LDAP host
    release:
      name: xwiki
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: xwiki
        document:
          spec:
            template:
              spec:
                containers:
                  - name: xwiki
                    env:
                      - name: XWIKI_OPTS
                        value: -Dxwiki.authentication.authclass=org.xwiki.contrib.ldap.XWikiLDAPAuthServiceImpl

  - it: should set LDAP server URL
    release:
      name: xwiki
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: xwiki
        document:
          spec:
            template:
              spec:
                containers:
                  - name: xwiki
                    env:
                      - name: XWIKI_OPTS
                        valueRegexp: .*-Dxwiki.authentication.ldap.server_url=ldap://openldap:389.*

  - it: should configure LDAP bind DN
    release:
      name: xwiki
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: xwiki
        document:
          spec:
            template:
              spec:
                containers:
                  - name: xwiki
                    env:
                      - name: XWIKI_OPTS
                        valueRegexp: .*-Dxwiki.authentication.ldap.bind_DN=uid=ldapsearch_xwiki,cn=users,dc=opendesk,dc=edu.*

  - it: should set LDAP bind password from secret
    release:
      name: xwiki
    set:
      ldap:
        passwordSecretRef:
          name: xwiki-xwiki
          key: ldap_password
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: xwiki
        document:
          spec:
            template:
              spec:
                containers:
                  - name: xwiki
                    env:
                      - name: XWIKI_OPTS
                        valueFrom:
                          secretKeyRef:
                            name: xwiki-xwiki
                            key: ldap_password

  - it: should configure LDAP user base DN
    release:
      name: xwiki
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: xwiki
        document:
          spec:
            template:
              spec:
                containers:
                  - name: xwiki
                    env:
                      - name: XWIKI_OPTS
                        valueRegexp: .*-Dxwiki.authentication.ldap.user_base=ou=users,dc=opendesk,dc=edu.*

  - it: should configure LDAP group base DN
    release:
      name: xwiki
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: xwiki
        document:
          spec:
            template:
              spec:
                containers:
                  - name: xwiki
                    env:
                      - name: XWIKI_OPTS
                        valueRegexp: .*-Dxwiki.authentication.ldap.group_base=ou=groups,dc=opendesk,dc=edu.*

  - it: should enable LDAP group synchronization
    release:
      name: xwiki
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: xwiki
        document:
          spec:
            template:
              spec:
                containers:
                  - name: xwiki
                    env:
                      - name: XWIKI_OPTS
                        valueRegexp: .*-Dxwiki.authentication.ldap.fields.update_on_sync=true.*

  - it: should configure LDAP group mapping
    release:
      name: xwiki
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: xwiki
        document:
          spec:
            template:
              spec:
                containers:
                  - name: xwiki
                    env:
                      - name: XWIKI_OPTS
                        valueRegexp: .*-Dxwiki.authentication.ldap.group_mapping=opendesk-users=XWikiAllGroup,opendesk-admins=XWikiAdminGroup.*
