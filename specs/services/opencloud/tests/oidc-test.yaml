suite: OpenCloud OIDC auto-provisioning config
templates:
  - deployment.yaml
tests:
  - it: should set OIDC client ID to opendesk-opencloud
    release:
      name: opencloud
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: opencloud
        document:
          spec:
            template:
              spec:
                containers:
                  - name: backend
                    env:
                      - name: OPENXCHANGE_OIDC_CLIENT_ID
                        value: opendesk-opencloud

  - it: should configure OIDC discovery URL
    release:
      name: opencloud
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: opencloud
        document:
          spec:
            template:
              spec:
                containers:
                  - name: backend
                    env:
                      - name: OPENXCHANGE_OIDC_DISCOVERY_URL
                        value: https://keycloak.opendesk.hrz.uni-marburg.de/auth/realms/opendek/.well-known/openid-configuration

  - it: should set OIDC client secret from secret
    release:
      name: opencloud
    set:
      oidc:
        clientSecretRef:
          name: opencloud-opencloud
          key: oidc-client-secret
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: opencloud
        document:
          spec:
            template:
              spec:
                containers:
                  - name: backend
                    env:
                      - name: OPENXCHANGE_OIDC_CLIENT_SECRET
                        valueFrom:
                          secretKeyRef:
                            name: opencloud-opencloud
                            key: oidc-client-secret

  - it: should enable OIDC auto-provisioning
    release:
      name: opencloud
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: opencloud
        document:
          spec:
            template:
              spec:
                containers:
                  - name: backend
                    env:
                      - name: OPENXCHANGE_OIDC_AUTO_PROVISIONING
                        value: "true"

  - it: should configure OIDC scopes
    release:
      name: opencloud
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: opencloud
        document:
          spec:
            template:
              spec:
                containers:
                  - name: backend
                    env:
                      - name: OPENXCHANGE_OIDC_SCOPES
                        value: openid,profile,email

  - it: should map OIDC claims
    release:
      name: opencloud
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: opencloud
        document:
          spec:
            template:
              spec:
                containers:
                  - name: backend
                    env:
                      - name: OPENXCHANGE_OIDC_CLAIM_EMAIL
                        value: email
                      - name: OPENXCHANGE_OIDC_CLAIM_USERNAME
                        value: preferred_username
                      - name: OPENXCHANGE_OIDC_CLAIM_DISPLAYNAME
                        value: name
