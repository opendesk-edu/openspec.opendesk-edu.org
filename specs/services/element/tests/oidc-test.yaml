suite: Element (Synapse) OIDC client config
templates:
  - statefulset.yaml
tests:
  - it: should set OIDC client ID to opendesk-matrix
    release:
      name: element
    asserts:
      - containsDocument:
          kind: StatefulSet
          apiVersion: apps/v1
          name: synapse
        document:
          spec:
            template:
              spec:
                containers:
                  - name: synapse
                    env:
                      - name: SYNAPSE_OIDC_SCOPES
                        value: openid
                      - name: SYNAPSE_OIDC_CLIENT_ID
                        value: opendesk-matrix

  - it: should configure OIDC discovery URL
    release:
      name: element
    asserts:
      - containsDocument:
          kind: StatefulSet
          apiVersion: apps/v1
          name: synapse
        document:
          spec:
            template:
              spec:
                containers:
                  - name: synapse
                    env:
                      - name: SYNAPSE_OIDC_ISSUER
                        value: https://keycloak.opendesk.hrz.uni-marburg.de/auth/realms/opendek

  - it: should set OIDC client secret from secret
    release:
      name: element
    set:
      oidc:
        clientSecretRef:
          name: element-synapse
          key: oidc-client-secret
    asserts:
      - containsDocument:
          kind: StatefulSet
          apiVersion: apps/v1
          name: synapse
        document:
          spec:
            template:
              spec:
                containers:
                  - name: synapse
                    env:
                      - name: SYNAPSE_OIDC_CLIENT_SECRET
                        valueFrom:
                          secretKeyRef:
                            name: element-synapse
                            key: oidc-client-secret

  - it: should configure OIDC backend
    release:
      name: element
    asserts:
      - containsDocument:
          kind: StatefulSet
          apiVersion: apps/v1
          name: synapse
        document:
          spec:
            template:
              spec:
                containers:
                  - name: synapse
                    env:
                      - name: SYNAPSE_OIDC_BACKEND
                        value: generic

  - it: should enable OIDC user mapping
    release:
      name: element
    asserts:
      - containsDocument:
          kind: StatefulSet
          apiVersion: apps/v1
          name: synapse
        document:
          spec:
            template:
              spec:
                containers:
                  - name: synapse
                    env:
                      - name: SYNAPSE_OIDC_USER_MAPPING_PROVIDER
                        value: config

  - it: should configure OIDC allow existing users
    release:
      name: element
    asserts:
      - containsDocument:
          kind: StatefulSet
          apiVersion: apps/v1
          name: synapse
        document:
          spec:
            template:
              spec:
                containers:
                  - name: synapse
                    env:
                      - name: SYNAPSE_OIDC_ALLOW_EXISTING_USERS
                        value: "true"

  - it: should set OIDC scopes
    release:
      name: element
    asserts:
      - containsDocument:
          kind: StatefulSet
          apiVersion: apps/v1
          name: synapse
        document:
          spec:
            template:
              spec:
                containers:
                  - name: synapse
                    env:
                      - name: SYNAPSE_OIDC_SCOPES
                        value: openid,profile,email
