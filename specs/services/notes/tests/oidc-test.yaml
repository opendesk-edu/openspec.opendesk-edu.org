suite: Notes OIDC config verification
templates:
  - deployment.yaml
tests:
  - it: should set OIDC client ID to opendesk-notes
    release:
      name: notes
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: notes
        document:
          spec:
            template:
              spec:
                containers:
                  - name: notes
                    env:
                      - name: AUTH_TYPE
                        value: oidc
                      - name: OIDC_CLIENT_ID
                        value: opendesk-notes

  - it: should configure OIDC discovery URL
    release:
      name: notes
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: notes
        document:
          spec:
            template:
              spec:
                containers:
                  - name: notes
                    env:
                      - name: OIDC_ISSUER
                        value: https://keycloak.opendesk.hrz.uni-marburg.de/auth/realms/opendek

  - it: should set OIDC client secret from secret
    release:
      name: notes
    set:
      oidc:
        clientSecretRef:
          name: notes-notes
          key: oidc-client-secret
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: notes
        document:
          spec:
            template:
              spec:
                containers:
                  - name: notes
                    env:
                      - name: OIDC_CLIENT_SECRET
                        valueFrom:
                          secretKeyRef:
                            name: notes-notes
                            key: oidc-client-secret

  - it: should configure OIDC scopes
    release:
      name: notes
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: notes
        document:
          spec:
            template:
              spec:
                containers:
                  - name: notes
                    env:
                      - name: OIDC_SCOPES
                        value: openid,opendesk-notes-scope

  - it: should map email claim from Keycloak
    release:
      name: notes
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: notes
        document:
          spec:
            template:
              spec:
                containers:
                  - name: notes
                    env:
                      - name: OIDC_EMAIL_CLAIM
                        value: email

  - it: should configure login redirect to Nubus Portal on failure
    release:
      name: notes
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: notes
        document:
          spec:
            template:
              spec:
                containers:
                  - name: notes
                    env:
                      - name: OIDC_LOGIN_FAILURE_REDIRECT
                        value: https://ums-portal-server/portal

  - it: should configure logout redirect to Nubus Portal
    release:
      name: notes
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: notes
        document:
          spec:
            template:
              spec:
                containers:
                  - name: notes
                    env:
                      - name: OIDC_LOGOUT_REDIRECT
                        value: https://ums-portal-server/portal
