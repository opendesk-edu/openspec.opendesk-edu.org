suite: Nextcloud probe timing validation
templates:
  - deployment.yaml
tests:
  - it: should use periodSeconds instead of initialDelaySeconds for PHP-FPM load protection
    release:
      name: nextcloud
    set:
      phpFpm:
        probeType: periodSeconds
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: nextcloud
        document:
          spec:
            template:
              spec:
                containers:
                  - name: php-fpm
                    readinessProbe:
                      periodSeconds: 10
                    startupProbe:
                      periodSeconds: 10
                    livenessProbe:
                      periodSeconds: 10

  - it: should not use initialDelaySeconds for PHP-FPM probes (prevents 10x load)
    release:
      name: nextcloud
    set:
      phpFpm:
        probeType: standard
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: nextcloud
        document:
          spec:
            template:
              spec:
                containers:
                  - name: php-fpm
                    readinessProbe:
                      initialDelaySeconds: null
                    startupProbe:
                      initialDelaySeconds: null
                    livenessProbe:
                      initialDelaySeconds: null

  - it: should have appropriate probe timeouts
    release:
      name: nextcloud
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: nextcloud
        document:
          spec:
            template:
              spec:
                containers:
                  - name: php-fpm
                    readinessProbe:
                      timeoutSeconds: 5
                      failureThreshold: 3
                    startupProbe:
                      timeoutSeconds: 5
                      failureThreshold: 30
                    livenessProbe:
                      timeoutSeconds: 5
                      failureThreshold: 3

  - it: should set periodSeconds to 10 for all PHP-FPM probes
    release:
      name: nextcloud
    asserts:
      - containsDocument:
          kind: Deployment
          apiVersion: apps/v1
          name: nextcloud
        document:
          spec:
            template:
              spec:
                containers:
                  - name: php-fpm
                    readinessProbe:
                      periodSeconds: 10
                    startupProbe:
                      periodSeconds: 10
                    livenessProbe:
                      periodSeconds: 10
